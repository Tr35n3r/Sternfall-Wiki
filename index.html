<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fluch des Sternenfalls &#8212; Kompendium</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #0C0808;
  --bg-card:     rgba(20,14,14,.95);
  --bg-card-alt: rgba(28,20,18,.9);
  --ink-1:       #E8DCC8;
  --ink-2:       #D0C8B8;
  --ink-3:       #A8A090;
  --ink-4:       rgba(200,180,255,.45);
  --gold:        rgba(196,154,34,.6);
  --gold-lt:     rgba(196,154,34,.8);
  --gold-pale:   rgba(232,208,144,.4);
  --red:         rgba(160,30,30,.7);
  --green:       #2A6A2A;
  --purple:      rgba(120,80,200,.4);
  --border:      rgba(120,80,200,.15);
  --border-lt:   rgba(120,80,200,.08);
  --nav-bg:      #080405;
  --nav-bg2:     #140A0A;
  --sh-sm:       0 2px 10px rgba(0,0,0,.4);
  --sh-md:       0 4px 20px rgba(0,0,0,.5);
  --sh-lg:       0 8px 30px rgba(0,0,0,.6);
}

html { scroll-behavior: smooth; }

body {
  font-family: 'EB Garamond', Georgia, serif;
  font-size: 17px; line-height: 1.75;
  color: var(--ink-2);
  background-color: var(--bg);
  min-height: 100vh;
}

/* ── HEADER ── */
.site-header {
  background: linear-gradient(180deg, #080405 0%, #140A0A 60%, #1A0C0C 100%);
  color: #D4C098; padding: 3.5rem 1.5rem 3rem; text-align: center;
  border-bottom: 1px solid rgba(196,154,34,.15);
  position: relative; overflow: hidden;
}
.site-header::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 50%, rgba(120,80,200,.06) 0%, transparent 60%);
  pointer-events: none;
}
.site-header::after {
  content: ''; position: absolute; inset: 0;
  background-image:
    radial-gradient(1px 1px at 10% 20%, rgba(200,180,255,.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 30% 70%, rgba(255,220,150,.5) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 50% 30%, rgba(200,180,255,.7) 0%, transparent 100%),
    radial-gradient(1px 1px at 70% 60%, rgba(255,200,100,.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 90% 40%, rgba(200,180,255,.5) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 15% 80%, rgba(255,220,150,.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 85% 15%, rgba(200,160,255,.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 45% 90%, rgba(255,200,100,.4) 0%, transparent 100%);
  animation: starDrift 12s ease-in-out infinite alternate;
  pointer-events: none;
}
@keyframes starDrift {
  0% { opacity: .6; transform: translateY(0); }
  100% { opacity: 1; transform: translateY(-8px); }
}
.header-ornament { font-size: 1.2rem; letter-spacing: .7em; color: rgba(196,154,34,.4); margin-bottom: .8rem; position: relative; }
.site-title {
  font-family: 'Cinzel Decorative', serif; font-size: clamp(1.6rem, 5vw, 3rem); font-weight: 700;
  letter-spacing: .08em; color: #E8DCC8; position: relative;
  text-shadow: 0 0 30px rgba(120,80,200,.2), 0 2px 15px rgba(196,154,34,.3);
}
.site-sub { font-style: italic; font-size: 1rem; color: rgba(200,180,255,.45); letter-spacing: .06em; position: relative; margin-top: .5rem; }

/* ── NAV ── */
.main-nav {
  position: sticky; top: 0; z-index: 200;
  background: linear-gradient(180deg, #080405 0%, #100808 100%);
  border-bottom: 1px solid rgba(120,80,200,.12);
  box-shadow: 0 4px 20px rgba(0,0,0,.6);
}
.nav-inner { display: flex; overflow-x: auto; scrollbar-width: none; padding: 0 .5rem; }
.nav-inner::-webkit-scrollbar { display: none; }
.nav-btn {
  background: none; border: none; border-bottom: 2px solid transparent; margin-top: 2px;
  color: rgba(200,180,255,.35); font-family: 'Cinzel', serif; font-size: .75rem;
  font-weight: 600; letter-spacing: .09em; padding: .8rem 1.1rem; cursor: pointer;
  white-space: nowrap; transition: color .2s, border-color .2s;
  display: flex; align-items: center; gap: .38rem;
}
.nav-btn .nav-icon { font-size: 1rem; }
.nav-btn:hover { color: rgba(200,180,255,.7); border-bottom-color: rgba(120,80,200,.3); }
.nav-btn.active { color: #E8DCC8; border-bottom-color: rgba(196,154,34,.6); }

/* ── SEARCH ── */
.search-wrap { max-width: 620px; margin: 1.6rem auto; padding: 0 1rem; position: relative; }
.search-wrap input {
  width: 100%; background: rgba(20,14,14,.9); border: 1px solid rgba(120,80,200,.12);
  border-radius: 2px; padding: .7rem 1rem .7rem 2.8rem;
  font-family: 'EB Garamond', serif; font-size: 1rem; color: var(--ink-2);
  box-shadow: var(--sh-sm); outline: none; transition: border-color .3s, box-shadow .3s;
}
.search-wrap input:focus { border-color: rgba(196,154,34,.4); box-shadow: 0 0 12px rgba(120,80,200,.1); }
.search-wrap input::placeholder { color: rgba(200,180,255,.25); font-style: italic; }
.search-icon { position: absolute; left: 1.85rem; top: 50%; transform: translateY(-50%); font-size: 1.1rem; color: rgba(200,180,255,.25); pointer-events: none; }

/* ── CONTENT ── */
/* .content-section (legacy) */
#app > div { animation: fadeIn .35s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
.section-inner { max-width: 1100px; margin: 0 auto; padding-top: 2.2rem; }

/* ── SECTION HEADING ── */
.sec-heading { text-align: center; margin-bottom: 2.5rem; padding-bottom: 1.5rem; position: relative; }
.sec-heading::after {
  content: ''; position: absolute; bottom: 0; left: 25%; right: 25%; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(120,80,200,.3), rgba(196,154,34,.3), rgba(120,80,200,.3), transparent);
}
.sec-heading h2 { font-family: 'Cinzel Decorative', serif; font-size: clamp(1.5rem, 3.5vw, 2.1rem); color: var(--ink-1); letter-spacing: .08em; }
.sec-heading .orn { color: rgba(120,80,200,.35); font-size: 1.1rem; letter-spacing: .4em; }
.sec-heading p { font-style: italic; color: var(--ink-4); margin-top: .4rem; }

/* ── CARDS ── */
.card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
.card-grid-wide { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 1.5rem; }
.card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 3px;
  padding: 1.5rem; box-shadow: var(--sh-sm); position: relative;
  transition: transform .2s, box-shadow .3s, border-color .3s;
}
.card:hover { transform: translateY(-2px); border-color: rgba(196,154,34,.25); box-shadow: var(--sh-md), 0 0 12px rgba(120,80,200,.04); }
.card::before {
  content: ''; position: absolute; top: 5px; right: 5px; bottom: 5px; left: 5px;
  border: 1px solid rgba(120,80,200,.05); border-radius: 2px; pointer-events: none;
  transition: border-color .3s;
}
.card:hover::before { border-color: rgba(196,154,34,.1); }
.card.locked { filter: grayscale(.5) brightness(.6); }
.card.locked .card-body { filter: blur(4px); user-select: none; pointer-events: none; }
.locked-overlay {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  font-family: 'Cinzel', serif; font-size: .85rem; color: var(--ink-4); letter-spacing: .15em; z-index: 2;
}
.locked-overlay span { background: var(--bg-card); padding: .3rem .8rem; border: 1px solid var(--border); border-radius: 1px; }

/* ── BADGES ── */
.badge {
  display: inline-block; font-family: 'Cinzel', serif; font-size: .6rem; font-weight: 700;
  letter-spacing: .12em; text-transform: uppercase; padding: .18rem .6rem; border-radius: 1px;
  margin-bottom: .7rem; border: 1px solid rgba(255,255,255,.05);
}
.badge-entdeckt   { background: rgba(42,106,42,.6); color: #C0E0C0; border-color: rgba(42,106,42,.3); }
.badge-bekannt    { background: rgba(60,45,30,.6); color: #C8B898; border-color: rgba(80,60,40,.3); }
.badge-gerücht    { background: rgba(50,40,30,.6); color: #A89878; border-color: rgba(70,55,40,.3); }
.badge-gefürchtet { background: rgba(120,24,24,.5); color: #D4A080; border-color: rgba(120,24,24,.3); }
.badge-inquisition{ background: rgba(120,24,24,.5); color: #D4A080; border-color: rgba(120,24,24,.3); }
.badge-geister    { background: rgba(58,40,88,.5); color: #C0B8D8; border-color: rgba(120,80,200,.2); }
.badge-bald       { background: rgba(196,154,34,.3); color: #E8DCC8; border-color: rgba(196,154,34,.2); }
.badge-hauptstadt { background: rgba(30,22,16,.8); color: #D0C8B8; border-color: rgba(120,80,200,.15); }
.badge-dorf       { background: rgba(40,30,18,.6); color: #B8A880; border-color: rgba(80,60,30,.3); }
.badge-ruine      { background: rgba(35,28,18,.6); color: #A89870; border-color: rgba(60,48,30,.3); }

/* ── NPC CARD ── */
.npc-name { font-family: 'Cinzel', serif; font-size: 1.1rem; font-weight: 700; color: var(--ink-1); margin-bottom: .12rem; line-height: 1.3; }
.npc-title { font-style: italic; color: var(--ink-4); font-size: .92rem; margin-bottom: .15rem; }
.npc-location { font-size: .82rem; color: var(--gold); font-family: 'Cinzel', serif; letter-spacing: .05em; margin-bottom: .8rem; }
.npc-divider { border: none; border-top: 1px solid var(--border); margin: .8rem 0; }
.npc-desc { font-size: .95rem; color: var(--ink-3); line-height: 1.7; }
.npc-quote {
  margin-top: .9rem; padding: .6rem .9rem;
  background: rgba(120,80,200,.04); border-left: 2px solid rgba(120,80,200,.25);
  font-style: italic; font-size: .9rem; color: rgba(200,180,255,.5);
  border-radius: 0 2px 2px 0;
}
.npc-portrait { margin-bottom: .8rem; border-radius: 3px; overflow: hidden; border: 1px solid var(--border); }
.npc-portrait img { width: 100%; height: auto; display: block; filter: sepia(.1) brightness(.9); }

/* ── ORT / LOCATION CARD ── */
.ort-type { font-family: 'Cinzel', serif; font-size: .72rem; color: var(--gold); letter-spacing: .1em; margin-bottom: .5rem; text-transform: uppercase; }
.ort-name { font-family: 'Cinzel', serif; font-size: 1.25rem; font-weight: 700; color: var(--ink-1); margin-bottom: .6rem; }
.ort-meta { font-size: .85rem; color: var(--ink-4); font-style: italic; margin-bottom: .8rem; }
.ort-desc { font-size: .95rem; color: var(--ink-3); line-height: 1.7; }
.ort-list { list-style: none; margin-top: .8rem; padding-top: .8rem; border-top: 1px solid var(--border); }
.ort-list li { padding: .2rem 0 .2rem 1.2rem; font-size: .9rem; color: var(--ink-3); position: relative; }
.ort-list li::before { content: '\2726'; position: absolute; left: 0; color: var(--gold); font-size: .6rem; top: .45rem; }

/* ── FACTIONS ── */
.faction-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 2px;
  padding: 1.75rem; box-shadow: var(--sh-sm); margin-bottom: 1.5rem; position: relative;
}
.faction-card::before { content: ''; position: absolute; top: 5px; right: 5px; bottom: 5px; left: 5px; border: 1px solid rgba(120,80,200,.04); pointer-events: none; }
.faction-card.faction-lum { border-left: 5px solid rgba(196,154,34,.5); }
.faction-card.faction-inq { border-left: 5px solid var(--red); }
.faction-card.faction-ber { border-left: 5px solid var(--purple); }
.faction-card.faction-neb { border-left: 5px solid rgba(100,100,100,.3); }
.faction-header { display: flex; align-items: flex-start; gap: 1rem; margin-bottom: 1rem; }
.faction-symbol { font-size: 2rem; line-height: 1; width: 2.5rem; text-align: center; flex-shrink: 0; }
.faction-name { font-family: 'Cinzel', serif; font-size: 1.15rem; font-weight: 700; color: var(--ink-1); margin-bottom: .15rem; }
.faction-tagline { font-style: italic; color: var(--ink-4); font-size: .9rem; }
.faction-body { color: var(--ink-3); font-size: .95rem; line-height: 1.75; }
.faction-body strong { font-family: 'Cinzel', serif; font-size: .8rem; letter-spacing: .06em; color: var(--ink-2); }
.faction-body p + p { margin-top: .6rem; }
.faction-note {
  margin-top: .9rem; padding: .6rem .9rem;
  background: rgba(120,80,200,.03); border: 1px dashed var(--border);
  font-style: italic; font-size: .88rem; color: var(--ink-4);
}

/* ── MERCHANTS ── */
.merchant-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 2px;
  padding: 1.75rem; box-shadow: var(--sh-sm); margin-bottom: 2rem; position: relative;
}
.merchant-card::before { content: ''; position: absolute; top: 5px; right: 5px; bottom: 5px; left: 5px; border: 1px solid rgba(120,80,200,.04); pointer-events: none; }
.merchant-name { font-family: 'Cinzel', serif; font-size: 1.2rem; font-weight: 700; color: var(--ink-1); margin-bottom: .2rem; }
.merchant-keeper { font-style: italic; color: var(--ink-4); font-size: .9rem; margin-bottom: 1.2rem; }
.price-table { width: 100%; border-collapse: collapse; font-size: .9rem; }
.price-table th {
  font-family: 'Cinzel', serif; font-size: .72rem; letter-spacing: .09em; text-transform: uppercase;
  color: var(--ink-4); padding: .4rem .7rem; border-bottom: 1px solid rgba(120,80,200,.15); text-align: left;
}
.price-table th:last-child { text-align: right; }
.price-table td { padding: .5rem .7rem; color: var(--ink-3); border-bottom: 1px solid rgba(120,80,200,.06); }
.price-table td:last-child { text-align: right; font-family: 'Cinzel', serif; font-size: .85rem; color: var(--gold-lt); }
.price-table tr:hover td { background: rgba(120,80,200,.03); }
.price-section-head td {
  font-family: 'Cinzel', serif; font-size: .72rem; letter-spacing: .08em; text-transform: uppercase;
  color: var(--gold); padding-top: 1rem; border-bottom: 1px solid rgba(120,80,200,.1);
}
.merchant-note { margin-top: 1rem; font-style: italic; font-size: .88rem; color: var(--ink-4); border-top: 1px solid var(--border); padding-top: .8rem; }

/* ── LORE ── */
.lore-entry {
  max-width: 75ch; margin: 0 auto 2.2rem; padding: 1.8rem 2rem 1.8rem 2.5rem;
  background: var(--bg-card);
  border-left: 3px solid rgba(196,154,34,.25); border-right: 1px solid var(--border);
  border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
  box-shadow: var(--sh-sm);
}
.lore-entry h3 {
  font-family: 'Cinzel', serif; font-size: 1.15rem; font-weight: 700; color: var(--ink-1);
  margin-bottom: .7rem; padding-bottom: .5rem; border-bottom: 1px solid var(--border); letter-spacing: .04em;
}
.lore-entry p { font-size: .98rem; color: var(--ink-3); line-height: 1.85; }
.lore-entry p + p { margin-top: .7rem; }
.lore-initial {
  float: left; font-family: 'Cinzel Decorative', serif; font-size: 3.2rem; line-height: .9;
  color: rgba(196,154,34,.5); margin-right: .2rem; margin-top: .1rem;
  text-shadow: 0 0 15px rgba(120,80,200,.2);
}

/* ── CHRONIK ── */
.welcome-block {
  max-width: 70ch; margin: 0 auto 3rem; text-align: center; padding: 2.2rem;
  background: var(--bg-card); border: 1px solid var(--border);
  box-shadow: var(--sh-md); position: relative;
}
.welcome-block::before { content: ''; position: absolute; top: 6px; right: 6px; bottom: 6px; left: 6px; border: 1px solid rgba(120,80,200,.06); pointer-events: none; }
.welcome-block h3 { font-family: 'Cinzel Decorative', serif; font-size: 1.3rem; color: var(--ink-1); margin-bottom: 1rem; }
.welcome-block p { font-style: italic; color: var(--ink-3); font-size: 1.02rem; line-height: 1.85; }
.session-list { max-width: 70ch; margin: 0 auto; }
.session-item {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 2px;
  padding: 1.2rem 1.5rem; margin-bottom: 1rem; box-shadow: var(--sh-sm);
  display: flex; align-items: flex-start; gap: 1rem;
  transition: border-color .2s;
}
.session-item:hover { border-color: rgba(196,154,34,.2); }
.session-item.upcoming { border-left: 4px solid var(--gold); opacity: .7; }
.session-info h4 { font-family: 'Cinzel', serif; font-size: .95rem; font-weight: 700; color: var(--ink-1); margin-bottom: .2rem; }
.session-info p { font-size: .88rem; color: var(--ink-4); font-style: italic; }

/* ── PARTY ── */
.party-grid { display: flex; flex-wrap: wrap; gap: 1rem; justify-content: center; margin: 2rem auto; max-width: 900px; }
.party-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 2px;
  padding: 1rem 1.3rem; box-shadow: var(--sh-sm); min-width: 160px; text-align: center;
  flex: 1; max-width: 200px; transition: border-color .2s;
}
.party-card:hover { border-color: rgba(196,154,34,.2); }
.party-name { font-family: 'Cinzel', serif; font-size: .95rem; font-weight: 700; color: var(--ink-1); margin-bottom: .25rem; }
.party-class { font-size: .82rem; color: var(--gold-lt); font-style: italic; }
.party-race { font-size: .78rem; color: var(--ink-4); }
.party-icon { font-size: 1.8rem; margin-bottom: .4rem; }

/* ── MAP ── */
.map-marker {
  position: absolute; width: 0; height: 0; transform: translate(-50%, -50%);
  cursor: pointer; z-index: 5;
}
.marker-dot {
  width: 12px; height: 12px; border-radius: 50%;
  background: var(--gold-lt); border: 2px solid rgba(0,0,0,.6);
  position: absolute; top: -6px; left: -6px; transition: transform .2s;
  box-shadow: 0 0 6px rgba(120,80,200,.3);
}
.map-marker:hover .marker-dot, .map-marker.active .marker-dot { transform: scale(1.4); }
.map-marker:hover, .map-marker.active { z-index: 30; }
.marker-dot::after {
  content: ''; position: absolute; top: -5px; left: -5px; width: 22px; height: 22px;
  border-radius: 50%; background: rgba(120,80,200,.25);
  animation: mPulse 2.2s ease-in-out infinite;
}
.map-marker.m-start .marker-dot { background: #D04010; border-color: rgba(0,0,0,.6); width: 16px; height: 16px; top: -8px; left: -8px; box-shadow: 0 0 8px rgba(210,70,20,.4); }
.map-marker.m-start .marker-dot::after { top: -6px; left: -6px; width: 28px; height: 28px; background: rgba(210,70,20,.2); }
.map-marker.m-capital .marker-dot { background: #D0C8B8; }
.map-marker.m-feared .marker-dot { background: #A03030; box-shadow: 0 0 6px rgba(160,30,30,.4); }
.marker-lbl {
  position: absolute; top: 9px; left: 50%; transform: translateX(-50%);
  font-family: 'Cinzel', serif; font-size: .55rem; font-weight: 700;
  color: #E8DCC8; white-space: nowrap; text-align: center;
  text-shadow: 0 0 6px rgba(0,0,0,.9), 0 0 12px rgba(0,0,0,.7);
  letter-spacing: .05em; display: none; pointer-events: none;
}
.map-marker.m-capital .marker-lbl, .map-marker.m-feared .marker-lbl,
.map-marker.m-start .marker-lbl, .map-marker:hover .marker-lbl,
.map-marker.active .marker-lbl { display: block; }
.map-marker.m-start .marker-lbl { color: #FF8040; font-size: .62rem; top: 11px; }
.map-tooltip {
  position: absolute; bottom: 9px; left: 50%; transform: translateX(-50%);
  background: rgba(8,4,5,.95); color: #E8DCC8;
  font-family: 'EB Garamond', serif; font-size: .82rem; line-height: 1.35;
  padding: .45rem .7rem; border-radius: 2px; border: 1px solid rgba(120,80,200,.2);
  width: max-content; max-width: 220px; white-space: normal; text-align: center;
  display: none; z-index: 40; pointer-events: none;
  box-shadow: 0 4px 15px rgba(0,0,0,.6);
}
.map-marker:hover .map-tooltip, .map-marker.active .map-tooltip { display: block; }
.map-legend {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 2px;
  padding: 1.2rem 1.5rem; margin-top: 1.5rem; box-shadow: var(--sh-sm);
  font-size: .9rem; color: var(--ink-3);
}
.map-legend h4 { font-family: 'Cinzel', serif; font-size: .85rem; letter-spacing: .08em; color: var(--ink-2); margin-bottom: .75rem; }
.legend-items { display: flex; flex-wrap: wrap; gap: .75rem 2rem; }
.legend-item { display: flex; align-items: center; gap: .4rem; font-size: .85rem; }
.leg-dot { width: 10px; height: 10px; border-radius: 50%; border: 2px solid rgba(0,0,0,.5); flex-shrink: 0; }
.leg-start { background: #D04010; } .leg-capital { background: #D0C8B8; }
.leg-known { background: rgba(196,154,34,.8); } .leg-feared { background: #A03030; }
@keyframes mPulse { 0%,100% { opacity: 0; transform: scale(.7); } 50% { opacity: 1; transform: scale(1.15); } }

/* ── FOOTER ── */
.site-footer {
  background: #080405; color: rgba(120,80,200,.25); text-align: center; padding: 1.5rem;
  margin-top: 2rem; font-family: 'Cinzel', serif; font-size: .72rem;
  letter-spacing: .1em; border-top: 1px solid rgba(120,80,200,.1);
}

/* ── DIVIDER ── */
.orn-divider { text-align: center; color: rgba(120,80,200,.25); letter-spacing: .5em; margin: 2rem 0; font-size: .9rem; }



/* ── PHASE GATING ── */
.gated { display: none !important; }
.gone  { display: none !important; }
.lock-notice {
  grid-column: 1 / -1;
  text-align: center;
  background: rgba(196,168,112,.14);
  border: 1px dashed var(--border-lt);
  border-radius: 2px;
  padding: 1.1rem 1.4rem;
  color: var(--ink-4);
  font-style: italic;
  font-size: .95rem;
  margin: .5rem 0;
}
.lock-notice .lock-ic { font-size: 1.2rem; display:block; margin-bottom:.3rem; }

/* ── DM UNLOCK ── */
.dm-key-btn {
  background: none; border: 1px solid var(--border);
  color: #8B6535; font-family: 'Cinzel', serif; font-size: .68rem;
  letter-spacing: .1em; padding: .35rem .8rem; border-radius: 2px;
  cursor: pointer; transition: color .2s, border-color .2s;
}
.dm-key-btn:hover { color: var(--gold-lt); border-color: var(--gold); }
.unlock-modal-bg {
  position: fixed; inset: 0; background: rgba(28,10,2,.65);
  display: none; align-items: center; justify-content: center; z-index: 500; padding: 1rem;
}
.unlock-modal-bg.show { display: flex; }
.unlock-modal {
  background: rgba(20,14,14,.98); border: 2px solid var(--border); border-radius: 3px;
  padding: 1.8rem; max-width: 380px; width: 100%; text-align: center;
  box-shadow: 0 12px 40px rgba(0,0,0,.4);
}
.unlock-modal h3 { font-family: 'Cinzel', serif; font-size: 1.05rem; color: var(--ink-1); margin-bottom: .4rem; }
.unlock-modal p { font-size: .9rem; color: var(--ink-4); font-style: italic; margin-bottom: 1rem; }
.unlock-modal input {
  width: 100%; font-family: 'EB Garamond', serif; font-size: 1rem;
  padding: .6rem .8rem; border: 1px solid var(--border); border-radius: 2px;
  background: rgba(28,20,18,.9); color: var(--ink-1); text-align: center; letter-spacing: .05em;
}
.unlock-actions { display: flex; gap: .6rem; margin-top: 1rem; }
.unlock-actions button {
  flex: 1; font-family: 'Cinzel', serif; font-size: .78rem; letter-spacing: .05em;
  padding: .55rem; border-radius: 2px; cursor: pointer; border: 1px solid var(--border);
}
.unlock-actions .ub-go { background: var(--gold); color: #F5EDD0; }
.unlock-actions .ub-cancel { background: rgba(28,20,18,.9); color: var(--ink-2); }
.unlock-status { margin-top: .8rem; font-size: .82rem; min-height: 1.2em; }
.unlock-status.ok  { color: var(--green); }
.unlock-status.err { color: var(--red); }
.phase-badge {
  display:inline-block; font-family:'Cinzel',serif; font-size:.6rem; letter-spacing:.1em;
  background: var(--green); color:#F5EDD0; padding:.12rem .5rem; border-radius:1px; margin-left:.4rem;
}

/* ── ZOOM MAP ── */
.map-toolbar { display:flex; gap:.5rem; align-items:center; margin-bottom:.8rem; flex-wrap:wrap; }
.map-toolbar button {
  font-family:'Cinzel',serif; font-size:.72rem; letter-spacing:.05em;
  background: var(--ink-2); color:#F5EDD0; border:1px solid var(--border);
  padding:.45rem .9rem; border-radius:2px; cursor:pointer;
}
.map-toolbar button:hover { background: var(--ink-3); }
.map-toolbar .zlbl { font-family:'Cinzel',serif; font-size:.75rem; color:var(--ink-3); min-width:48px; text-align:center; }
.map-toolbar .hint { font-style:italic; font-size:.82rem; color:var(--ink-4); margin-left:auto; }
.map-frame {
  position: relative; width: 100%; overflow: hidden;
  border: 3px solid var(--border); box-shadow: var(--sh-lg);
  background: #1A0802; border-radius: 2px; cursor: grab; touch-action: none;
}
.map-frame.grabbing { cursor: grabbing; }
.map-stage { position: relative; transform-origin: 0 0; }
.map-stage img { width:100%; height:auto; display:block; pointer-events:none; user-select:none; }

/* full legend table */
.legend-full { margin-top: 1.2rem; }
.legend-toggle {
  font-family:'Cinzel',serif; font-size:.78rem; letter-spacing:.06em;
  background: rgba(20,14,14,.98); border:1px solid var(--border-lt); color:var(--ink-2);
  padding:.5rem 1rem; border-radius:2px; cursor:pointer; width:100%;
}
.legend-table { width:100%; border-collapse:collapse; font-size:.85rem; margin-top:.8rem; display:none; }
.legend-table.show { display: table; }
.legend-table th { font-family:'Cinzel',serif; font-size:.7rem; letter-spacing:.06em; text-transform:uppercase; color:var(--ink-4); text-align:left; padding:.4rem .6rem; border-bottom:2px solid var(--border-lt); }
.legend-table td { padding:.35rem .6rem; color:var(--ink-3); border-bottom:1px solid rgba(196,168,112,.3); }
.legend-table td:first-child { font-family:'Cinzel',serif; color:var(--gold); width:2.5rem; }
.legend-table tr:hover td { background: rgba(196,168,112,.1); }

.legend-toggle {
  font-family:'Cinzel',serif; font-size:.78rem; letter-spacing:.06em;
  background: rgba(20,14,14,.98); border:1px solid var(--border-lt); color:var(--ink-2);

}

.legend-table.show { display: table; }
.legend-table th { font-family:'Cinzel',serif; font-size:.7rem; letter-spacing:.06em; text-transform:uppercase; color:var(--ink-4); text-align:left; padding:.4rem .6rem; border-bottom:2px solid var(--border-lt); }

.legend-table td:first-child { font-family:'Cinzel',serif; color:var(--gold); width:2.5rem; }

/* ── PORTRAIT EXTERN ── */
/* Wenn Bilder nicht geladen werden koennen (Datei fehlt), */
/* zeige ein Parchment-Platzhalter-Feld statt gebrochenem Icon */
.npc-portrait { background: rgba(28,20,18,.9); }
.npc-portrait img, .merchant-portrait img {
  display: block; min-height: 10px;
}

/* ── VERFOLGUNGSGRAD ── */
.vf-rule {
  background: rgba(122,24,24,.08); border: 1px solid var(--border-lt);
  border-left: 4px solid var(--red); border-radius: 2px;
  padding: 1rem 1.3rem; margin-bottom: 1.6rem; font-size: .95rem; color: var(--ink-2);
}
.vf-rule strong { font-family:'Cinzel',serif; font-size:.82rem; color: var(--red); }
.vf-tracker {
  background: rgba(20,14,14,.98); border: 2px solid var(--border); border-radius: 3px;
  padding: 1.6rem; text-align: center; box-shadow: var(--sh-md); margin-bottom: 2rem;
  transition: border-color .3s, box-shadow .3s;
}
.vf-current-label { font-family:'Cinzel',serif; font-size:.7rem; letter-spacing:.12em; text-transform:uppercase; color: var(--ink-4); }
.vf-big {
  font-family:'Cinzel Decorative',serif; font-size: 4rem; line-height:1; font-weight:700;
  color: var(--green); margin:.3rem 0; transition: color .3s;
}
.vf-name { font-family:'Cinzel',serif; font-size:1.2rem; font-weight:700; color: var(--ink-1); letter-spacing:.04em; }
.vf-desc { font-style: italic; color: var(--ink-3); font-size:.95rem; margin-top:.3rem; min-height:1.4em; }
.vf-scale { display:flex; gap:.4rem; justify-content:center; margin:1.2rem 0; }
.vf-scale .seg { flex:1; max-width:60px; height:10px; border-radius:2px; background: rgba(28,20,18,.9); border:1px solid var(--border-lt); transition: background .2s; }
.vf-buttons { display:flex; flex-wrap:wrap; gap:.5rem; justify-content:center; margin-top:.5rem; }
.vf-btn {
  font-family:'Cinzel',serif; font-size:.72rem; letter-spacing:.04em;
  border:1px solid var(--border); border-radius:2px; padding:.5rem .9rem; cursor:pointer;
  background: rgba(28,20,18,.9); color: var(--ink-2); transition: background .15s, transform .1s;
}
.vf-btn:active { transform: scale(.96); }
.vf-btn.up  { background: var(--ink-3); color:#F5EDD0; }
.vf-btn.dn  { background: var(--green); color:#F5EDD0; }
.vf-btn.dis { background: var(--gold); color:#F5EDD0; }
.vf-btn.ent { background: var(--red); color:#F5EDD0; }
.vf-h { font-family:'Cinzel',serif; font-size:1rem; letter-spacing:.05em; color:var(--ink-2); text-align:center; margin:1.5rem 0 1rem; }
.vf-levels { display:grid; gap:.5rem; margin-bottom:2rem; }
.vf-lvl { display:flex; align-items:center; gap:1rem; background:var(--bg-card); border:1px solid var(--border-lt); border-radius:2px; padding:.7rem 1rem; font-size:.9rem; color:var(--ink-3); }
.vf-lvl .vn { font-family:'Cinzel Decorative',serif; font-size:1.5rem; font-weight:700; width:2rem; text-align:center; flex-shrink:0; }
.vf-lvl b { font-family:'Cinzel',serif; color:var(--ink-1); font-size:.92rem; }
.vf-lvl.l0 { border-left:5px solid #3E7A3E; } .vf-lvl.l0 .vn { color:#3E7A3E; }
.vf-lvl.l1 { border-left:5px solid #8AA32A; } .vf-lvl.l1 .vn { color:#8AA32A; }
.vf-lvl.l2 { border-left:5px solid #C49A22; } .vf-lvl.l2 .vn { color:#C49A22; }
.vf-lvl.l3 { border-left:5px solid #C4701A; } .vf-lvl.l3 .vn { color:#C4701A; }
.vf-lvl.l4 { border-left:5px solid #A83418; } .vf-lvl.l4 .vn { color:#A83418; }
.vf-lvl.l5 { border-left:5px solid #7A1818; background:rgba(122,24,24,.07); } .vf-lvl.l5 .vn { color:#7A1818; }
.vf-mods { display:grid; grid-template-columns:1fr 1fr; gap:1.2rem; margin-bottom:2rem; }
.vf-mod-col { background:var(--bg-card); border:1px solid var(--border-lt); border-radius:2px; padding:1rem 1.2rem; }
.vf-mod-col.up { border-top:4px solid var(--red); }
.vf-mod-col.dn { border-top:4px solid var(--green); }
.vf-mod-col h4 { font-family:'Cinzel',serif; font-size:.85rem; letter-spacing:.05em; margin-bottom:.6rem; color:var(--ink-1); }
.vf-mod-col table { width:100%; border-collapse:collapse; font-size:.88rem; }
.vf-mod-col td { padding:.32rem .2rem; color:var(--ink-3); border-bottom:1px solid rgba(196,168,112,.3); }
.vf-mod-col td:last-child { text-align:right; font-family:'Cinzel',serif; font-weight:700; }
.vf-mod-col.up td:last-child { color: var(--red); }
.vf-mod-col.dn td:last-child { color: var(--green); }
.vf-disguise { background:var(--bg-card); border:1px solid var(--border-lt); border-left:4px solid var(--gold); border-radius:2px; padding:1.1rem 1.3rem; margin-bottom:1.5rem; }
.vf-disguise h4 { font-family:'Cinzel',serif; font-size:.88rem; color:var(--ink-1); margin-bottom:.6rem; }
.vf-disguise p { font-size:.9rem; color:var(--ink-3); margin-bottom:.4rem; }
.vf-disguise strong { font-family:'Cinzel',serif; font-size:.78rem; color:var(--ink-2); }
.vf-foot { text-align:center; font-family:'Cinzel',serif; font-size:.78rem; letter-spacing:.06em; color:var(--gold); padding:1rem 0; }

/* ── RESPONSIVE ── */
@media (max-width: 620px) {
  .card-grid, .card-grid-wide { grid-template-columns: 1fr; }
  .lore-entry { padding: 1.3rem 1.2rem 1.3rem 1.6rem; }
  .party-card { max-width: 140px; }
  .vf-mods { grid-template-columns: 1fr; }
}
@media (max-width: 400px) {
  .nav-btn .nav-label { display: none; }
  .nav-btn { padding: .8rem .8rem; }
}

/* ─── REALM FILTER ─── */
.realm-filter{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1.5rem;}
.rf{font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.06em;
  padding:.45rem 1rem;border:1px solid var(--border-lt);border-radius:2px;
  background:var(--bg-card-alt);color:var(--ink-3);cursor:pointer;
  transition:background .15s,color .15s;}
.rf:hover{background:var(--bg-card);color:var(--ink-2);}
.rf.active{color:#F5EDD0;border-color:transparent;}
.rf[data-r="all"].active{background:var(--ink-2);}
.rf[data-r="atherion"].active{background:#5C3A1A;}
.rf[data-r="arkanis"].active{background:#3A2858;}
.rf[data-r="salzklinge"].active{background:#1A3A40;}
.rf[data-r="auregant"].active{background:#5A4A10;}
.realm-empty{grid-column:1/-1;text-align:center;padding:2rem 1rem;
  color:var(--ink-4);font-style:italic;display:none;}


/* ─── SECTION CONTAINER ─── */
#app{min-height:60vh;padding:0 1rem 4rem;}
#app > div{animation:fadeIn .3s ease;}


/* ─── LOADING ─── */
.app-loading{text-align:center;padding:4rem 1rem;
  font-family:'Cinzel',serif;font-size:.85rem;letter-spacing:.1em;
  color:var(--ink-4);}


/* --- QUESTLOG FILTER --- */
.quest-filters{background:var(--bg-card);border:1px solid var(--border);border-radius:3px;padding:1.2rem;margin-bottom:1.5rem;box-shadow:var(--sh-sm);}
.quest-filter-group{margin-bottom:.9rem;}
.quest-filter-label{font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-4);margin-bottom:.4rem;}
.quest-filter-row{display:flex;flex-wrap:wrap;gap:.35rem;}
.qfilt{font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.04em;background:rgba(20,14,14,.8);color:var(--ink-4);border:1px solid var(--border);padding:.3rem .7rem;border-radius:2px;cursor:pointer;transition:all .15s;}
.qfilt:hover{color:var(--ink-2);border-color:rgba(196,154,34,.25);}
.qfilt.active{background:rgba(196,154,34,.2);color:var(--ink-1);border-color:rgba(196,154,34,.4);}
.quest-reset-btn{font-family:'Cinzel',serif;font-size:.72rem;background:none;color:var(--ink-4);border:1px solid var(--border);padding:.4rem .8rem;border-radius:2px;cursor:pointer;transition:all .15s;}
.quest-reset-btn:hover{color:var(--ink-2);border-color:rgba(196,154,34,.25);}
.quest-count{font-size:.82rem;color:var(--ink-4);font-style:italic;}
.quest-item-list{display:flex;flex-direction:column;gap:.8rem;}
.quest-item{background:var(--bg-card);border:1px solid var(--border);border-radius:3px;padding:1.2rem;box-shadow:var(--sh-sm);transition:border-color .2s;}
.quest-item:hover{border-color:rgba(196,154,34,.2);}
.quest-item[data-typ="hauptquest"]{border-left:4px solid rgba(196,154,34,.6);}
.quest-item[data-status="achtung"]{border-left:4px solid rgba(160,30,30,.6);}
.quest-item[data-status="raetsel"]{border-left:4px solid rgba(120,80,200,.4);}
.quest-item[data-status="abgeschlossen"]{opacity:.5;}
.quest-header{display:flex;align-items:flex-start;gap:.7rem;flex-wrap:wrap;}
.quest-icon{font-size:1.2rem;flex-shrink:0;width:1.4rem;text-align:center;color:var(--gold-lt);}
.quest-title{font-family:'Cinzel',serif;font-size:.95rem;font-weight:700;color:var(--ink-1);line-height:1.3;}
.quest-giver{font-size:.78rem;color:var(--ink-4);font-style:italic;margin-top:.1rem;}
.qstatus,.qreich{flex-shrink:0;font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;padding:.15rem .5rem;border-radius:1px;}
.qstatus-offen{background:rgba(42,80,42,.5);color:#A8C8A8;}
.qstatus-abgeschlossen{background:rgba(60,60,60,.5);color:#909090;text-decoration:line-through;}
.qstatus-achtung{background:rgba(120,30,30,.5);color:#D8A0A0;}
.qstatus-raetsel{background:rgba(80,60,160,.5);color:#C0B0E8;}
.qreich{margin-left:auto;}
.qreich-atherion{background:rgba(80,50,20,.5);color:#C8A870;}
.qreich-arkanis{background:rgba(60,40,100,.5);color:#B8A8D8;}
.qreich-salzklinge{background:rgba(20,60,60,.5);color:#90C8C8;}
.qreich-auregant{background:rgba(80,70,10,.5);color:#C8C070;}
.qreich-alle{background:rgba(40,40,40,.5);color:#A0A0A0;}
.quest-body{padding-left:2.1rem;margin-top:.6rem;font-size:.92rem;color:var(--ink-3);line-height:1.7;}
.quest-details{margin-top:.5rem;padding:.5rem .7rem;background:rgba(120,80,200,.03);border:1px solid var(--border);border-radius:2px;font-size:.85rem;}
.quest-detail{padding:.15rem 0;color:var(--ink-3);}
.quest-detail strong{font-family:'Cinzel',serif;font-size:.72rem;color:var(--ink-2);}
.quest-empty{text-align:center;padding:2rem;color:var(--ink-4);font-style:italic;}


/* ─── GLOSSAR ─── */
.glossar-entry{padding:1rem 0;border-bottom:1px solid var(--border);transition:background .15s;}
.glossar-entry:hover{background:rgba(120,80,200,.02);}
.glossar-entry:last-child{border-bottom:none;}
.glossar-term{font-family:'Cinzel',serif;font-size:1rem;font-weight:700;color:var(--ink-1);
  margin-bottom:.3rem;letter-spacing:.03em;}
.glossar-def{font-size:.93rem;color:var(--ink-3);line-height:1.75;padding-left:1rem;
  border-left:2px solid rgba(196,154,34,.2);}


/* --- FUNDSTUECKE FILTER --- */
.fund-filters{background:var(--bg-card);border:1px solid var(--border);border-radius:3px;padding:1.2rem;margin-bottom:1.5rem;box-shadow:var(--sh-sm);}
.fund-filter-group{margin-bottom:.9rem;}
.fund-filter-label{font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-4);margin-bottom:.4rem;}
.fund-filter-row{display:flex;flex-wrap:wrap;gap:.35rem;}
.filt{font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.04em;background:rgba(20,14,14,.8);color:var(--ink-4);border:1px solid var(--border);padding:.3rem .7rem;border-radius:2px;cursor:pointer;transition:all .15s;}
.filt:hover{color:var(--ink-2);border-color:rgba(196,154,34,.25);}
.filt.active{background:rgba(196,154,34,.2);color:var(--ink-1);border-color:rgba(196,154,34,.4);}
.fund-reset{font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.04em;background:none;color:var(--ink-4);border:1px solid var(--border);padding:.4rem .8rem;border-radius:2px;cursor:pointer;transition:all .15s;}
.fund-reset:hover{color:var(--ink-2);border-color:rgba(196,154,34,.25);}
.fund-count{font-size:.82rem;color:var(--ink-4);font-style:italic;}
.fund-empty{text-align:center;padding:2rem;color:var(--ink-4);font-style:italic;}
.fund-list{display:flex;flex-direction:column;gap:.7rem;}
.fund-item{display:flex;gap:1rem;background:var(--bg-card);border:1px solid var(--border);border-radius:3px;padding:1.1rem;box-shadow:var(--sh-sm);transition:border-color .2s;}
.fund-item:hover{border-color:rgba(196,154,34,.25);}
.fund-icon{font-size:1.5rem;flex-shrink:0;width:2rem;text-align:center;margin-top:.15rem;}
.fund-name{font-family:'Cinzel',serif;font-size:.95rem;font-weight:700;color:var(--ink-1);margin-bottom:.3rem;}
.fund-tags{display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:.5rem;}
.ftag{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.06em;text-transform:uppercase;padding:.12rem .45rem;border-radius:1px;}
.ftag-besitzer{background:rgba(80,60,30,.5);color:#C8B878;}
.ftag-untersucht{background:rgba(42,80,42,.5);color:#A8C8A8;}
.ftag-unbekannt{background:rgba(60,50,80,.5);color:#B8B0D8;}
.ftag-verbraucht{background:rgba(80,40,40,.5);color:#C8A0A0;}
.ftag-herkunft{background:rgba(40,40,60,.5);color:#A8B0C8;}
.ftag-magisch{background:rgba(80,40,120,.5);color:#C0A8E8;}
.ftag-hinweis{background:rgba(120,80,20,.5);color:#D8B870;}
.ftag-dokument{background:rgba(40,60,80,.5);color:#A0B8C8;}
.ftag-schluessel{background:rgba(80,100,40,.5);color:#B8C890;}
.ftag-sonstiges{background:rgba(60,60,60,.5);color:#A8A8A8;}
.fund-desc{font-size:.9rem;color:var(--ink-3);line-height:1.65;}
@media(max-width:620px){.fund-item{flex-direction:column;}.fund-icon{width:auto;}}

/* ─── NOTIZEN ─── */
.notiz-toolbar{display:flex;flex-wrap:wrap;gap:.6rem;align-items:center;margin-bottom:1rem;}
.notiz-btn{font-family:'Cinzel',serif;font-size:.75rem;letter-spacing:.05em;
  background:rgba(20,14,14,.9);color:var(--ink-2);border:1px solid var(--border);
  padding:.5rem 1rem;border-radius:2px;cursor:pointer;transition:border-color .2s,color .2s;}
.notiz-btn:hover{border-color:rgba(196,154,34,.4);color:var(--ink-1);}
.notiz-btn-warn{color:rgba(160,30,30,.7);}
.notiz-btn-warn:hover{border-color:rgba(160,30,30,.4);}
.notiz-status{font-family:'Cinzel',serif;font-size:.75rem;color:var(--gold-lt);margin-left:.5rem;}
.notiz-tabs{display:flex;gap:0;margin-bottom:0;border-bottom:1px solid var(--border);}
.notiz-tab{font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.04em;

.notiz-input{width:100%;min-height:400px;padding:1.2rem;font-family:'EB Garamond',serif;

/* ─── MAP POPUP (erweitert) ─── */

}
.map-popup.show{display:block;}
.map-popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:499;display:none;}
.map-popup-overlay.show{display:block;}
.map-popup-title{font-family:'Cinzel',serif;font-size:.95rem;font-weight:700;

.map-popup-img.blurry{filter:blur(10px) grayscale(.4) brightness(.7);}
.map-popup-img-placeholder{width:100%;height:140px;display:flex;align-items:center;justify-content:center;

.map-popup-close:hover{color:var(--ink-1);}


/* ─── Merchant Portrait Fix ─── */

<script>
/* ============================================================
   STERNENFALL WIKI v4 — Main Script
   Alle Sections werden per fetch() geladen.
   Encoding: UTF-8 throughout.
   ============================================================ */

/* ── BASE URL (funktioniert in Unterverzeichnissen) ── */
var BASE = (function(){
  var p = window.location.pathname;
  return p.substring(0, p.lastIndexOf('/') + 1);
})();

/* ── CACHE & STATE ── */
var cache = {};
var current = 'chronik';

/* ── SECTION LADEN ── */
function load(id) {
  current = id;
  // Nav: active class setzen
  document.querySelectorAll('.nav-btn').forEach(function(b){
    b.classList.toggle('active', b.dataset.s === id);
  });
  // Suche leeren
  document.getElementById('srch').value = '';

  if (cache[id]) { inject(id, cache[id]); return; }

  document.getElementById('app').innerHTML =
    '<div class="app-loading">&#10022; &nbsp; Lade &hellip; &nbsp; &#10022;</div>';

  fetch(BASE + 'sections/' + id + '.html')
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status + ' — ' + BASE + 'sections/' + id + '.html');
      return r.text();
    })
    .then(function(html) {
      cache[id] = html;
      if (current === id) inject(id, html);
    })
    .catch(function(err) {
      document.getElementById('app').innerHTML =
        '<div class="app-loading" style="color:#7A1818;">&#9888; ' +
        err.message + '<br><small>Serverstart: <code>python3 -m http.server 8080</code></small></div>';
    });
  window.scrollTo({top: 0, behavior: 'smooth'});
}




/* ── MAP POPUP (global, via onclick im HTML) ── */
function showMapPopup(el){
  // Overlay erstellen falls nötig
  if(!document.getElementById('mapPopupOverlay')){
    var ov=document.createElement('div');ov.className='map-popup-overlay';ov.id='mapPopupOverlay';
    ov.onclick=function(){closeMapPopup();};
    document.body.appendChild(ov);
    var pd=document.createElement('div');pd.className='map-popup';pd.id='mapPopupDiv';
    document.body.appendChild(pd);
  }
  var d=el.dataset;
  var h='<button class="map-popup-close" onclick="closeMapPopup()">&times;</button>';
  h+='<div class="map-popup-title">'+(d.popupTitle||'')+'</div>';
  if(d.popupImg){
    h+='<img src="'+d.popupImg+'" alt="" class="map-popup-img'+(d.popupBlur?' blurry':'')+'">';
  }else{
    h+='<div class="map-popup-img-placeholder">Noch nicht besucht</div>';
  }
  if(d.popupLinks){
    h+='<div class="map-popup-links">';
    d.popupLinks.split('|').forEach(function(lk){
      var p=lk.split('::');if(p.length===2)h+='<a href="'+p[1]+'" target="_blank">'+p[0]+'</a>';
    });
    h+='</div>';
  }
  h+='<div class="map-popup-desc">'+(d.popupDesc||'')+'</div>';
  document.getElementById('mapPopupDiv').innerHTML=h;
  document.getElementById('mapPopupDiv').classList.add('show');
  document.getElementById('mapPopupOverlay').classList.add('show');
}
function closeMapPopup(){
  var p=document.getElementById('mapPopupDiv'),o=document.getElementById('mapPopupOverlay');
  if(p)p.classList.remove('show');if(o)o.classList.remove('show');
}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeMapPopup();});

/* -- QUESTLOG -- */
function initQuestlog(){
  var activeQF = { status:'all', reich:'all' };
  function apply(){
    var items=document.querySelectorAll('#questList .quest-item');
    var v=0;
    items.forEach(function(it){
      var show=(activeQF.status==='all'||it.dataset.status===activeQF.status)&&
               (activeQF.reich==='all'||it.dataset.reich===activeQF.reich);
      it.style.display=show?'':'none'; if(show)v++;
    });
    var c=document.getElementById('questCount'); if(c)c.textContent=v;
    var e=document.getElementById('questEmpty'); if(e)e.style.display=v===0?'block':'none';
  }
  window.questReset=function(){
    activeQF={status:'all',reich:'all'};
    document.querySelectorAll('.qfilt').forEach(function(b){b.classList.toggle('active',b.dataset.value==='all');});
    apply();
  };
  document.querySelectorAll('.qfilt').forEach(function(btn){
    btn.addEventListener('click',function(){
      var g=btn.dataset.filter; activeQF[g]=btn.dataset.value;
      document.querySelectorAll('.qfilt[data-filter="'+g+'"]').forEach(function(b){b.classList.toggle('active',b.dataset.value===btn.dataset.value);});
      apply();
    });
  });
  apply();
}

/* -- FUNDSTUECKE -- */
function initFundstuecke(){
  var activeFF={ besitzer:'all', zustand:'all', herkunft:'all', quelle:'all', kategorie:'all', reich:'all'};
  function apply(){
    var items=document.querySelectorAll('#fundList .fund-item');
    var v=0;
    items.forEach(function(it){
      var show=(activeFF.besitzer==='all'||it.dataset.besitzer===activeFF.besitzer)&&
               (activeFF.zustand==='all'||it.dataset.zustand===activeFF.zustand)&&
               (activeFF.herkunft==='all'||it.dataset.herkunft===activeFF.herkunft)&&
               (activeFF.quelle==='all'||it.dataset.quelle===activeFF.quelle)&&
               (activeFF.kategorie==='all'||it.dataset.kategorie===activeFF.kategorie)&&
               (activeFF.reich==='all'||it.dataset.reich===activeFF.reich);
      it.style.display=show?'':'none'; if(show)v++;
    });
    var c=document.getElementById('fundCount'); if(c)c.textContent=v;
    var e=document.getElementById('fundEmpty'); if(e)e.style.display=v===0?'block':'none';
  }
  window.fundReset=function(){
    activeFF={besitzer:'all',zustand:'all',herkunft:'all',quelle:'all',kategorie:'all',reich:'all'};
    document.querySelectorAll('.filt').forEach(function(b){b.classList.toggle('active',b.dataset.value==='all');});
    apply();
  };
  document.querySelectorAll('.filt').forEach(function(btn){
    btn.addEventListener('click',function(){
      var g=btn.dataset.filter; activeFF[g]=btn.dataset.value;
      document.querySelectorAll('.filt[data-filter="'+g+'"]').forEach(function(b){b.classList.toggle('active',b.dataset.value===btn.dataset.value);});
      apply();
    });
  });
  apply();
}

/* -- NOTIZEN -- */
function initNotizen(){
  var tabs = document.querySelectorAll('#app .notiz-tab');
  var area = document.getElementById('notizText');
  if (!tabs.length || !area) return;
  var currentTab = 'allgemein';
  var KEY = 'sfk_notizen';
  function loadAll(){ try{return JSON.parse(localStorage.getItem(KEY))||{};}catch(e){return {};} }
  function saveAll(d){ try{localStorage.setItem(KEY,JSON.stringify(d));}catch(e){} }
  function switchTab(tab){
    var data=loadAll(); data[currentTab]=area.value; saveAll(data);
    currentTab=tab; area.value=data[tab]||'';
    tabs.forEach(function(t){t.classList.toggle('active',t.dataset.tab===tab);});
  }
  tabs.forEach(function(t){ t.addEventListener('click',function(){switchTab(this.dataset.tab);}); });
  setInterval(function(){var data=loadAll();data[currentTab]=area.value;saveAll(data);},2000);
  var data=loadAll(); area.value=data[currentTab]||'';
  window.notizExport=function(){
    var data=loadAll(); data[currentTab]=area.value;
    var lines=['========================================','  FLUCH DES STERNENFALLS - NOTIZEN',
      '  Exportiert: '+new Date().toLocaleString('de-CH'),'========================================',''];
    var tn={allgemein:'ALLGEMEIN',quests:'QUESTS & AUFTRAEGE',verdacht:'VERDAECHTIGUNGEN',ideen:'IDEEN & THEORIEN'};
    for(var k in tn){lines.push('--- '+tn[k]+' ---');lines.push(data[k]||'(leer)');lines.push('');}
    var blob=new Blob([lines.join('\n')],{type:'text/plain;charset=utf-8'});
    var a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download='sternenfall_notizen_'+new Date().toISOString().slice(0,10)+'.txt';a.click();
    var st=document.getElementById('notizStatus');
    if(st){st.textContent='\u2713 Gespeichert!';setTimeout(function(){st.textContent='';},2500);}
  };
  window.notizClear=function(){
    if(confirm('Wirklich ALLE Notizen loeschen?')){
      localStorage.removeItem(KEY);area.value='';
      var st=document.getElementById('notizStatus');
      if(st){st.textContent='Geloescht.';setTimeout(function(){st.textContent='';},2000);}
    }
  };
}

/* ── SECTION EINF&UUML;GEN ── */
function inject(id, html) {
  document.getElementById('app').innerHTML = html;
  // Phase gating
  (getUnlocked() || []).forEach(applyPhase);
  // Realm filter
  document.querySelectorAll('#app .realm-filter').forEach(function(rf) {
    rf.querySelectorAll('.rf').forEach(function(btn) {
      btn.addEventListener('click', function() {
        rf.querySelectorAll('.rf').forEach(function(b){ b.classList.remove('active'); });
        btn.classList.add('active');
        realmFilter(btn.dataset.r);
      });
    });
  });
  // Section-spezifische Inits
  if (id === 'karte')     { if (typeof initMap === 'function')  initMap();  }
  if (id === 'verfolgung'){ if (typeof initVf  === 'function')  initVf();   }
  if (id === 'notizen')      { if (typeof initNotizen    === 'function') initNotizen();    }
  if (id === 'questlog')    { if (typeof initQuestlog   === 'function') initQuestlog();   }
  if (id === 'fundstuecke') { if (typeof initFundstuecke === 'function') initFundstuecke(); }
  // Suche re-anwenden falls aktiv
  var q = document.getElementById('srch').value.trim();
  if (q) applySearch(q);
  // Suche re-anwenden falls aktiv
  var q = document.getElementById('srch').value.trim();
  if (q) applySearch(q);
}

/* ── REALM FILTER ── */
function realmFilter(r) {
  var any = false;
  document.querySelectorAll('#app [data-realm]').forEach(function(c) {
    if (c.classList.contains('gated')) return; // Gating hat Vorrang
    var show = (r === 'all' || c.dataset.realm === r);
    c.style.display = show ? '' : 'none';
    if (show) any = true;
  });
  document.querySelectorAll('#app .realm-empty').forEach(function(e) {
    e.style.display = any ? 'none' : 'block';
  });
}

/* ── SUCHE ── */
function applySearch(q) {
  q = q.toLowerCase().trim();
  document.querySelectorAll('#app .searchable').forEach(function(el) {
    var t = (el.dataset.search || el.textContent || '').toLowerCase();
    el.style.display = (!q || t.includes(q)) ? '' : 'none';
  });
}
document.getElementById('srch').addEventListener('input', function(){
  applySearch(this.value);
});
document.addEventListener('keydown', function(e) {
  var s = document.getElementById('srch');
  if (e.key === '/' && document.activeElement !== s) { e.preventDefault(); s.focus(); }
  if (e.key === 'Escape') { s.value = ''; applySearch(''); s.blur(); }
});

/* ── PHASE UNLOCK ── */
/* ════════════════════════════════════════════════════════════
   DM-KONFIGURATION — NUR DIESEN BLOCK BEARBEITEN
   
   So funktioniert's:
   1. Neues Passwort unten eintragen (z.B. mondschein: 3)
   2. Im HTML einer Section: class="... gated p3" setzen
   3. Fertig — der Rest passiert automatisch.
   
   Beispiel für eine neue Phase:
     mondschein: 3,     // Phase 3 — was auch immer du willst
   
   Dann im HTML (z.B. sections/personen.html):
     <div class="card searchable gated p3" data-search="...">
   
   Die Karte erscheint erst, wenn ein Spieler "mondschein" eingibt.
   Beliebig viele Phasen möglich (p4, p5, p6...).
   ════════════════════════════════════════════════════════════ */

var CODES = {
  nebelkeller: 1,     // Phase 1
  nachtluft:   2,     // Phase 2
  // hierunter neue Phasen einfügen:
  // mondschein:  3,   // Phase 3
  // beispiel:    4,   // Phase 4
};

function getUnlocked() {
  try { var v = localStorage.getItem('sfk_phases'); return v ? JSON.parse(v) : []; }
  catch(e) { return window._ph || []; }
}
function setUnlocked(arr) {
  window._ph = arr;
  try { localStorage.setItem('sfk_phases', JSON.stringify(arr)); } catch(e) {}
}
function applyPhase(p) {
  document.querySelectorAll('#app .p'+p).forEach(function(el){ el.classList.remove('gated'); });
  document.querySelectorAll('#app .p'+p+'n').forEach(function(el){ el.classList.add('gone'); });
}
function tryUnlock() {
  var code = (document.getElementById('unlockInput').value || '').trim().toLowerCase();
  var st = document.getElementById('unlockStatus');
  if (CODES.hasOwnProperty(code)) {
    var p = CODES[code]; var arr = getUnlocked();
    if (arr.indexOf(p) < 0) arr.push(p);
    setUnlocked(arr); applyPhase(p);
    st.className = 'unlock-status ok';
    st.textContent = '\u2713 Phase ' + p + ' freigeschaltet.';
    document.getElementById('unlockInput').value = '';
  } else {
    st.className = 'unlock-status err';
    st.textContent = '\u2717 Unbekannter Code.';
  }
}
function resetUnlocks() {
  setUnlocked([]);
  document.getElementById('unlockStatus').textContent = 'Zur\u00fcckgesetzt.';
  setTimeout(function(){ location.reload(); }, 500);
}
var mb = document.getElementById('unlockBg');
if (mb) {
  mb.addEventListener('click', function(e){ if(e.target===this) this.classList.remove('show'); });
}
document.addEventListener('keydown', function(e){
  var mb = document.getElementById('unlockBg');
  if (e.key === 'Escape' && mb) mb.classList.remove('show');
});

/* ── VF COUNTER ── */
function initVf() {
  var LV = [
    {n:'Unauff\u00e4llig', d:'Keine bekannten Vorkommnisse.', c:'#3E7A3E'},
    {n:'Erste Ger\u00fcchte', d:'Fl\u00fcsterer haben etwas bemerkt.', c:'#8AA32A'},
    {n:'Verd\u00e4chtigung', d:'Ein W\u00e4chter beobachtet euch.', c:'#C49A22'},
    {n:'Inquisition mobil', d:'Ein Inquisitor ist in der Gegend.', c:'#C4701A'},
    {n:'Direktes Verh\u00f6r', d:'Ihr wurdet gemeldet.', c:'#A83418'},
    {n:'Seraphine!', d:'Sie leitet die Jagd pers\u00f6nlich.', c:'#7A1818'}
  ];
  var cur = 0;
  try { var s=localStorage.getItem('sfk_vf'); if(s!==null) cur=Math.max(0,Math.min(5,parseInt(s)||0)); } catch(e){}
  function render() {
    var big=document.getElementById('vfBig'); if(!big) return;
    var L=LV[cur];
    big.textContent=cur; big.style.color=L.c;
    var nn=document.getElementById('vfName');
    if(nn){nn.textContent=L.n; nn.style.color=(cur>=4?L.c:'var(--ink-1)');}
    var dd=document.getElementById('vfDesc'); if(dd) dd.textContent=L.d;
    var tr=document.getElementById('vfTracker');
    if(tr) tr.style.borderColor=(cur>=3?L.c:'var(--border)');
    var sc=document.getElementById('vfScale');
    if(sc){sc.innerHTML='';for(var i=0;i<6;i++){var sg=document.createElement('div');sg.className='seg';if(i<=cur)sg.style.background=LV[i].c;sc.appendChild(sg);}}
    try{localStorage.setItem('sfk_vf',String(cur));}catch(e){}
  }
  window.vfStep=function(d){cur=Math.max(0,Math.min(5,cur+d));render();};
  window.vfSet =function(v){cur=Math.max(0,Math.min(5,v));render();};
  render();
}

/* ── MAP ZOOM ── */
function initMap() {
  var frame=document.getElementById('mapFrame');
  var stage=document.getElementById('mapStage');
  if(!frame||!stage) return;
  var img=stage.querySelector('img');
  var zoom=1,px=0,py=0;

  function apply(){
    stage.style.transform='translate('+px+'px,'+py+'px) scale('+zoom+')';
    var lbl=document.getElementById('mapZlbl');if(lbl)lbl.textContent=Math.round(zoom*100)+'%';
    stage.querySelectorAll('.map-marker').forEach(function(m){
      m.style.transform='translate(-50%,-50%) scale('+(1/zoom)+')';
    });
  }
  function clamp(){
    var fw=frame.clientWidth,fh=frame.clientHeight;
    px=Math.min(0,Math.max(fw-fw*zoom,px));
    py=Math.min(0,Math.max(fh-(img.clientHeight||fh)*zoom,py));
  }
  window.mapZoom=function(f){zoom=Math.min(6,Math.max(1,zoom*f));clamp();apply();};
  window.mapReset=function(){zoom=1;px=0;py=0;apply();};

  frame.addEventListener('wheel',function(e){
    e.preventDefault();
    var r=frame.getBoundingClientRect(),cx=e.clientX-r.left,cy=e.clientY-r.top,oz=zoom;
    zoom=Math.min(6,Math.max(1,zoom*(e.deltaY<0?1.15:0.87)));
    px=cx-(cx-px)*(zoom/oz);py=cy-(cy-py)*(zoom/oz);clamp();apply();
  },{passive:false});

  /* ── DRAG — Capture erst NACH Bewegung, nie bei einfachem Klick ── */
  var dragging=false, startX=0, startY=0, startPx=0, startPy=0, pid=null;

  frame.addEventListener('pointerdown',function(e){
    startX=e.clientX; startY=e.clientY; startPx=px; startPy=py;
    pid=e.pointerId; dragging=false;
    /* KEIN setPointerCapture hier! Erst bei Bewegung. */
  });

  frame.addEventListener('pointermove',function(e){
    if(pid===null) return;
    var dx=e.clientX-startX, dy=e.clientY-startY;
    if(!dragging && (Math.abs(dx)>5||Math.abs(dy)>5)){
      dragging=true;
      frame.classList.add('grabbing');
      try{frame.setPointerCapture(pid);}catch(ex){}
    }
    if(dragging){
      px=startPx+dx; py=startPy+dy; clamp(); apply();
    }
  });

  frame.addEventListener('pointerup',function(e){
    if(dragging) frame.classList.remove('grabbing');
    try{frame.releasePointerCapture(e.pointerId);}catch(ex){}
    dragging=false; pid=null;
  });

  /* ── MARKER CLICKS — normales onclick, kein Pointer-Konflikt mehr ── */
  /* Popup-Marker: onclick="showMapPopup(this)" im HTML */
  /* Normale Marker: Tooltip toggle via click auf stage */
  stage.addEventListener('click',function(e){
    var mk=e.target.closest('.map-marker');
    if(!mk) {
      stage.querySelectorAll('.map-marker.active').forEach(function(o){o.classList.remove('active');});
      return;
    }
    if(mk.hasAttribute('data-popup')) return; /* onclick im HTML uebernimmt */
    var was=mk.classList.contains('active');
    stage.querySelectorAll('.map-marker.active').forEach(function(o){o.classList.remove('active');});
    if(!was) mk.classList.add('active');
  });

  if(img.complete) apply(); else img.addEventListener('load',apply);
}
