<div class="section-inner">
  <div class="sec-heading">
    <div class="orn">&#10022; &#10023; &#10022;</div>
    <h2>Notizen</h2>
    <p>Eure pers&ouml;nlichen Aufzeichnungen &mdash; bleiben im Browser gespeichert</p>
  </div>

  <div style="max-width:800px;margin:0 auto;">

    <div class="notiz-toolbar">
      <button class="notiz-btn" onclick="notizExport()">&#9112; Als Textdatei speichern</button>
      <button class="notiz-btn notiz-btn-warn" onclick="notizClear()">&#9888; Alle Notizen l&ouml;schen</button>
      <span class="notiz-status" id="notizStatus"></span>
    </div>

    <div class="notiz-tabs" id="notizTabs">
      <button class="notiz-tab active" data-tab="allgemein">Allgemein</button>
      <button class="notiz-tab" data-tab="quests">Quests &amp; Auftr&auml;ge</button>
      <button class="notiz-tab" data-tab="verdacht">Verd&auml;chtigungen</button>
      <button class="notiz-tab" data-tab="ideen">Ideen &amp; Theorien</button>
    </div>

    <div class="notiz-area">
      <textarea class="notiz-input" id="notizText" placeholder="Schreibe deine Notizen hier...&#10;&#10;Tipp: Alles wird automatisch im Browser gespeichert.&#10;Am Ende der Session &laquo;Als Textdatei speichern&raquo; klicken."></textarea>
    </div>

    <div class="notiz-hint">
      &#10022; Notizen werden automatisch im Browser gespeichert (localStorage). Sie &uuml;berleben Neuladen, aber nicht Browser-Cache-L&ouml;schung. Exportiere regelm&auml;ssig!
    </div>

  </div>
</div>

<script>
(function(){
  var tabs = document.querySelectorAll('.notiz-tab');
  var area = document.getElementById('notizText');
  var currentTab = 'allgemein';
  var KEY = 'sfk_notizen';

  function loadAll(){
    try { return JSON.parse(localStorage.getItem(KEY)) || {}; } catch(e){ return {}; }
  }
  function saveAll(data){
    try { localStorage.setItem(KEY, JSON.stringify(data)); } catch(e){}
  }

  function switchTab(tab){
    var data = loadAll();
    data[currentTab] = area.value;
    saveAll(data);
    currentTab = tab;
    area.value = data[tab] || '';
    tabs.forEach(function(t){ t.classList.toggle('active', t.dataset.tab===tab); });
  }

  tabs.forEach(function(t){
    t.addEventListener('click', function(){ switchTab(this.dataset.tab); });
  });

  // Auto-save alle 2 Sekunden
  setInterval(function(){
    var data = loadAll();
    data[currentTab] = area.value;
    saveAll(data);
  }, 2000);

  // Initial laden
  var data = loadAll();
  area.value = data[currentTab] || '';

  // Export
  window.notizExport = function(){
    var data = loadAll();
    data[currentTab] = area.value;
    var lines = [];
    lines.push('========================================');
    lines.push('  FLUCH DES STERNENFALLS - NOTIZEN');
    lines.push('  Exportiert: ' + new Date().toLocaleString('de-CH'));
    lines.push('========================================');
    lines.push('');
    var tabNames = {allgemein:'ALLGEMEIN', quests:'QUESTS & AUFTRAEGE', verdacht:'VERDAECHTIGUNGEN', ideen:'IDEEN & THEORIEN'};
    for (var key in tabNames) {
      lines.push('--- ' + tabNames[key] + ' ---');
      lines.push(data[key] || '(leer)');
      lines.push('');
    }
    var blob = new Blob([lines.join('\n')], {type:'text/plain;charset=utf-8'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'sternenfall_notizen_' + new Date().toISOString().slice(0,10) + '.txt';
    a.click();
    URL.revokeObjectURL(url);
    var st = document.getElementById('notizStatus');
    st.textContent = '\u2713 Gespeichert!';
    setTimeout(function(){ st.textContent=''; }, 2500);
  };

  window.notizClear = function(){
    if(confirm('Wirklich ALLE Notizen in ALLEN Tabs loeschen?')){
      localStorage.removeItem(KEY);
      area.value = '';
      var st = document.getElementById('notizStatus');
      st.textContent = 'Geloescht.';
      setTimeout(function(){ st.textContent=''; }, 2000);
    }
  };
})();
</script>
